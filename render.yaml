services:
  # Django API Service
  - type: web
    name: familyplus-api
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /admin/login/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: familyplus-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: familyplus.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
        placeholder: "https://familyplus.vercel.app"
      - key: ALLOWED_HOSTS
        value: "familyplus-api.onrender.com"
      - key: DEBUG
        value: "False"

databases:
  - name: familyplus-db
    plan: free
    region: oregon
    postgresMajorVersion: 15
